        const { useState, useMemo, useEffect, useRef } = React;

        const getSafeVal = (obj, keys, fallback = "") => {
            if (!obj) return fallback;
            for (const key of keys) {
                if (obj[key] !== undefined && obj[key] !== null) return obj[key];
            }
            return fallback;
        };

        const downloadAsCsv = (data, fileName) => {
            const csv = Papa.unparse(data);
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${fileName}.csv`;
            link.click();
        };

        // --- IndexedDB：用于刷新后仍保留“导入数据 + 人工决策结果”
        const REVIEW_DB_NAME = 'meta_ai_reviewer_db';
        const REVIEW_DB_VERSION = 1;
        const STORE_FILE = 'reviewer_file';   // 保存：导入后的 list + fileName
        const STORE_STATE = 'reviewer_state'; // 保存：marks + idx
        const ACTIVE_SESSION_ID = 'active';

        function openReviewDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(REVIEW_DB_NAME, REVIEW_DB_VERSION);
                req.onupgradeneeded = () => {
                    const db = req.result;
                    if (!db.objectStoreNames.contains(STORE_FILE)) {
                        db.createObjectStore(STORE_FILE, { keyPath: 'sessionId' });
                    }
                    if (!db.objectStoreNames.contains(STORE_STATE)) {
                        db.createObjectStore(STORE_STATE, { keyPath: 'sessionId' });
                    }
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function idbGet(storeName, key) {
            const db = await openReviewDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const req = store.get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function idbPut(storeName, value) {
            const db = await openReviewDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                const req = store.put(value);
                req.onsuccess = () => resolve(true);
                req.onerror = () => reject(req.error);
            });
        }

        function App() {
            const [activeTab, setActiveTab] = useState(() => {
                return localStorage.getItem('meta_ai_activeTab') || 'intro';
            });

            useEffect(() => {
                localStorage.setItem('meta_ai_activeTab', activeTab);
            }, [activeTab]);

            useEffect(() => {
                // 如果本地已有复核进度，刷新后默认切到“人工复核”页
                (async () => {
                    try {
                        const stateRec = await idbGet(STORE_STATE, ACTIVE_SESSION_ID);
                        const savedMarks = (stateRec && stateRec.marks) ? stateRec.marks : {};
                        if (savedMarks && Object.keys(savedMarks).length > 0) {
                            setActiveTab('reviewer');
                        }
                    } catch (e) {
                        // 忽略失败（如浏览器禁用存储等）
                    }

call_qwen <- function(prompt, api_key, system_prompt) {

  url <- "https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation"

  res <- POST(
    url,

      parameters = list(
        temperature = 0,
        max_tokens = 200
      )
    ), auto_unbox = TRUE)
  )

  content(res, as = "parsed", encoding = "UTF-8")
}

                        <div className="mt-3 bg-amber-50 border border-amber-100 rounded-2xl px-4 py-3 text-xs text-amber-900 flex flex-col gap-1.5">
                            <div className="font-bold">温馨提示</div>
                            <p>
                                请将 AI 模型的输出视为<span className="font-semibold">辅助参考</span>，关键纳入/排除决策仍需人工严谨把关。
                                对于边界条目，建议在本工具的“文献人工复核”页中再次仔细核查。
                            </p>
                            <p>
                                当前示例使用的是阿里云通义千问 Qwen 接口，API 文档可参考：
                                <a
                                    href="https://bailian.console.aliyun.com/cn-beijing?tab=api#/api"
                                    target="_blank"
                                    rel="noreferrer"
                                    className="underline font-semibold text-amber-800 ml-1"
                                >
                                    阿里云百炼开放平台文档
                                </a>
                                。你也可以将 R 代码中的 <span className="font-mono bg-amber-100 px-1 py-0.5 rounded">call_qwen()</span> 替换为调用其他大模型（如本地模型或海外 API），再将结果写回 CSV 后导入本工具进行人工复核。
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 页面 1: RIS 转换器 ---
        function ConverterPage() {
            const [risData, setRisData] = useState({ content: '', name: '' });
            const [results, setResults] = useState([]);
            const [showHint, setShowHint] = useState(true);

            const tableHeaders = useMemo(() => {
                if (results.length === 0) return [];
                const keys = new Set();
                results.slice(0, 50).forEach(row => Object.keys(row).forEach(k => keys.add(k)));
                return Array.from(keys);
            }, [results]);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setRisData({ content: ev.target.result, name: file.name });
                    setResults([]);
                };
                reader.readAsText(file);
            };

            const convert = () => {
                if (!risData.content) return;
                const entries = risData.content.split(/ER\s+-\s*/);
                const records = entries.map(entry => {
                    const record = {};
                    entry.split(/\r?\n/).forEach(line => {
                        const m = line.trim().match(/^([A-Z0-9]{2})\s+-\s+(.*)$/);
                        if (m) {
                            const tag = m[1], val = m[2];
                            record[tag] = record[tag] ? `${record[tag]}; ${val}` : val;
                        }
                    });
                    return record;
                }).filter(r => Object.keys(r).length);
                setResults(records);
            };

            return (
                <div className="space-y-6 animate-fade">
                    {showHint && (
                        <div className="bg-indigo-50 border border-indigo-100 p-5 rounded-2xl flex justify-between items-start shadow-sm">
                            <div className="text-sm text-indigo-700">
                                <p className="font-bold mb-1 italic tracking-tighter">转换指南：</p>
                                <ul className="list-disc list-inside opacity-80 space-y-0.5">
                                    <li>支持合并 RIS 中的重复标签（如多个 AU 作者字段）。</li>
                                    <li>转换后可直接预览前 50 条数据。</li>
                                    <li>导出 CSV 已内置 BOM，Excel 打开不会出现中文乱码。</li>
                                </ul>
                            </div>
                            <button onClick={() => setShowHint(false)} className="text-indigo-300 hover:text-indigo-500 font-bold px-2 text-xl">✕</button>
                        </div>
                    )}

                    <div className="bg-white p-8 rounded-3xl border shadow-sm">
                        <h2 className="text-xl font-bold mb-6">RIS 转换为 CSV</h2>
                        <div className="flex flex-wrap gap-4 items-center bg-gray-50 p-6 rounded-2xl border border-dashed border-gray-200">
                            <input type="file" id="ris-up" onChange={handleFile} accept=".ris" className="hidden" />
                            <label htmlFor="ris-up" className="px-6 py-2.5 bg-white border border-indigo-200 text-indigo-600 rounded-xl font-bold cursor-pointer hover:bg-indigo-50 shadow-sm text-sm">选择 RIS 文件</label>
                            <span className="text-sm font-medium text-gray-400 truncate max-w-[200px]">{risData.name || "未选择文件"}</span>
                            <button onClick={convert} disabled={!risData.content} className="px-8 py-2.5 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-100 disabled:opacity-30 text-sm">开始转换预览</button>
                            <button onClick={() => downloadAsCsv(results, risData.name.replace('.ris', ''))} disabled={!results.length} className="px-8 py-2.5 bg-white border border-gray-200 rounded-xl font-bold hover:bg-gray-50 disabled:opacity-30 text-gray-600 text-sm shadow-sm">导出 CSV</button>
                        </div>
                    </div>

                    {results.length > 0 && (
                        <div className="bg-white rounded-3xl border shadow-sm overflow-hidden animate-fade">
                            <div className="px-6 py-4 bg-gray-50 border-b flex justify-between items-center">
                                <span className="text-xs font-bold text-gray-500 uppercase tracking-widest">数据预览 (共 {results.length} 条记录)</span>
                            </div>
                            <div className="overflow-x-auto custom-scroll max-h-[500px]">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-white sticky top-0 shadow-sm z-10">
                                        <tr>
                                            {tableHeaders.map(header => (
                                                <th key={header} className="p-4 text-[10px] font-black text-gray-400 uppercase border-b whitespace-nowrap bg-white">{header}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-50">
                                        {results.slice(0, 50).map((row, i) => (
                                            <tr key={i} className="hover:bg-indigo-50/30 transition-colors">
                                                {tableHeaders.map(header => (
                                                    <td key={header} className="p-4 text-xs text-gray-600 truncate max-w-[250px]" title={row[header]}>{row[header] || "-"}</td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- 页面 2: 复核页面 ---
        function ReviewerPage() {
            const [list, setList] = useState([]);
            const [idx, setIdx] = useState(0);
            const [marks, setMarks] = useState({});
            const [fileName, setFileName] = useState('');
            const [showHint, setShowHint] = useState(true);
            const [jumpTo, setJumpTo] = useState('');
            const [hydrated, setHydrated] = useState(false);
            const restoringRef = useRef(true);
            const hasList = list && list.length > 0;

            const handleUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const baseName = file.name.replace(/\.[^/.]+$/, "");
                setFileName(baseName);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    let data = [];
                    if (file.name.endsWith('.csv')) {
                        data = Papa.parse(ev.target.result, { header: true, skipEmptyLines: true }).data;
                    } else {
                        const wb = XLSX.read(ev.target.result, { type: 'binary' });
                        data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    }
                    const initMarks = {};
                    data.forEach((row, i) => {
                        const val = String(getSafeVal(row, ['exclude', 'EXCLUDE'], '0')).toLowerCase();
                        initMarks[i] = (val === '1' || val === 'true') ? '1' : '0';
                    });
                    setList(data);
                    setMarks(initMarks);
                    setIdx(0);

                    // 写入 IndexDB：导入数据 + 人工结果，刷新后可恢复
                    localStorage.setItem('meta_ai_activeTab', 'reviewer');
                    setTimeout(() => {
                        idbPut(STORE_FILE, { sessionId: ACTIVE_SESSION_ID, fileName: baseName, list: data });
                        idbPut(STORE_STATE, { sessionId: ACTIVE_SESSION_ID, marks: initMarks, idx: 0 });
                    }, 0);
                };
                if (file.name.endsWith('.csv')) reader.readAsText(file, "UTF-8");
                else reader.readAsBinaryString(file);
            };

            const cur = hasList ? list[idx] : null;
            const isExcluded = hasList && marks[idx] === '1';

            useEffect(() => {
                // 加载本地持久化进度（刷新后恢复）
                (async () => {
                    try {
                        const [fileRec, stateRec] = await Promise.all([
                            idbGet(STORE_FILE, ACTIVE_SESSION_ID),
                            idbGet(STORE_STATE, ACTIVE_SESSION_ID),
                        ]);
                        if (fileRec && Array.isArray(fileRec.list) && fileRec.list.length >= 0) {
                            const data = fileRec.list || [];
                            const savedMarks = (stateRec && stateRec.marks) ? stateRec.marks : {};
                            // 若保存的 marks 不完整，按当前 list 的 exclude 列补齐
                            const hasAnyMark = savedMarks && Object.keys(savedMarks).length > 0;
                            let finalMarks = savedMarks;
                            if (!hasAnyMark) finalMarks = {};
                            for (let i = 0; i < data.length; i++) {
                                if (finalMarks[i] === '0' || finalMarks[i] === '1') continue;
                                const val = String(getSafeVal(data[i], ['exclude', 'EXCLUDE'], '0')).toLowerCase();
                                finalMarks[i] = (val === '1' || val === 'true') ? '1' : '0';
                            }
                            setFileName(fileRec.fileName || '');
                            setList(data);
                            setMarks(finalMarks);
                            const savedIdx = stateRec ? stateRec.idx : undefined;
                            if (typeof savedIdx === 'number' && savedIdx >= 0 && savedIdx < data.length) {
                                setIdx(savedIdx);
                            } else {
                                // 默认落到第一个 exclude=0（便于“再核实”）
                                let firstKeep = 0;
                                for (let i = 0; i < data.length; i++) {
                                    if (finalMarks[i] === '0') {
                                        firstKeep = i;
                                        break;
                                    }
                                }
                                setIdx(firstKeep);
                            }
                            localStorage.setItem('meta_ai_activeTab', 'reviewer');
                        }
                    } catch (e) {
                        // 忽略失败
                    } finally {
                        restoringRef.current = false;
                        setHydrated(true);
                    }
                })();
            }, []);

            useEffect(() => {
                // 键盘快捷键：方向键 / WASD / 空格切换条目，X 设为排除
                const handleKey = (e) => {
                    if (!hasList) return;
                    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
                    const key = e.key;
                    if (key === 'ArrowLeft' || key === 'ArrowUp' || key === 'a' || key === 'A' || key === 'w' || key === 'W') {
                        setIdx((i) => Math.max(0, i - 1));
                    } else if (key === 'ArrowRight' || key === 'ArrowDown' || key === 'd' || key === 'D' || key === 's' || key === 'S' || key === ' ') {
                        e.preventDefault();
                        setIdx((i) => Math.min(list.length - 1, i + 1));
                    } else if (key === 'x' || key === 'X') {
                        setMarks((prev) => ({ ...prev, [idx]: '1' }));
                    }
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [hasList, list.length, idx]);

            useEffect(() => {
                // marks/idx 变化时保存，避免刷新导致人工决策丢失
                if (!hydrated) return;
                if (!list || !list.length) return;
                if (restoringRef.current) return;
                idbPut(STORE_STATE, { sessionId: ACTIVE_SESSION_ID, marks, idx });
            }, [hydrated, list, marks, idx]);

            const exclude0Indexes = useMemo(() => {
                if (!list || !list.length) return [];
                const arr = [];
                for (let i = 0; i < list.length; i++) {
                    if (marks[i] === '0') arr.push(i);
                }
                return arr;
            }, [marks, list.length]);

            const handleJump = () => {
                if (!list || !list.length) return;
                const n = Number(jumpTo);
                if (!Number.isFinite(n)) return;
                const targetIdx = Math.max(0, Math.min(list.length - 1, n - 1));
                setIdx(targetIdx);
            };

            return (
                <div className="space-y-6 animate-fade">
                    {showHint && (
                        <div className="bg-amber-50 border border-amber-100 p-5 rounded-2xl flex justify-between items-start shadow-sm">
                            <div className="text-sm text-amber-800">
                                <p className="font-bold mb-1 italic tracking-tighter">人工复核贴士：</p>
                                <ul className="list-disc list-inside opacity-80 space-y-0.5">
                                    <li>系统会自动寻找 <strong>TI/Title</strong> 和 <strong>AB/Abstract</strong> 列名。</li>
                                    <li>AI 预测信息已置顶显示，且放大了字体方便阅读。</li>
                                    <li>变量缺失不会报错，导出时将保存您的人工决策结果。</li>
                                </ul>
                            </div>
                            <button onClick={() => setShowHint(false)} className="text-amber-300 hover:text-amber-500 font-bold px-2 text-xl">✕</button>
                        </div>
                    )}

                    <div className="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center">
                        <div className="flex gap-4 items-center">
                            <input type="file" id="rev-in" className="hidden" onChange={handleUpload} accept=".csv,.xlsx" />
                            <label htmlFor="rev-in" className="px-5 py-2 bg-indigo-600 text-white rounded-xl font-bold cursor-pointer text-sm">导入复核数据</label>
                            {list.length > 0 && <span className="text-sm font-bold text-gray-400 bg-gray-50 px-4 py-1.5 rounded-xl">进度：{idx+1} / {list.length}</span>}
                            {list.length > 0 && (
                                <div className="flex items-center gap-2">
                                    <input
                                        type="number"
                                        min={1}
                                        max={list.length}
                                        value={jumpTo}
                                        onChange={(e) => setJumpTo(e.target.value)}
                                        onKeyDown={(e) => { if (e.key === 'Enter') handleJump(); }}
                                        placeholder="跳转行号(1..N)"
                                        className="w-40 px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-200"
                                    />
                                    <button onClick={handleJump} className="px-4 py-2 bg-gray-900 text-white rounded-xl font-bold text-sm shadow-sm hover:bg-gray-800">
                                        跳转
                                    </button>
                                </div>
                            )}
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="text-sm font-bold text-gray-500 bg-gray-50 px-3 py-2 rounded-xl border border-gray-100 max-w-[280px] truncate" title={fileName || "未上传文件"}>
                                当前文件：{fileName || "未上传文件"}
                            </span>
                            <button onClick={() => downloadAsCsv(list.map((r, i) => ({ ...r, exclude: marks[i] })), `${fileName}_checked`)}
                                disabled={!list.length} className="px-5 py-2 bg-amber-500 text-white rounded-xl font-bold text-sm shadow-md shadow-amber-100 disabled:opacity-30">
                                导出结果 (_checked.csv)
                            </button>
                        </div>
                    </div>

                    {list.length > 0 ? (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-8 space-y-6">
                                <div className="bg-white p-8 rounded-[2rem] border shadow-sm">
                                    <span className="text-[10px] font-bold text-gray-300 uppercase tracking-widest block mb-3">标题 (TI)</span>
                                    <h2 className="text-2xl font-black text-gray-800 leading-tight">
                                        {getSafeVal(cur, ['TI', 'Title', 'title'], "无标题内容")}
                                    </h2>
                                </div>
                                <div className="bg-white p-8 rounded-[2rem] border shadow-sm h-[500px] overflow-auto custom-scroll">
                                    <span className="text-[10px] font-bold text-gray-300 uppercase tracking-widest block mb-3">摘要 (AB)</span>
                                    <p className="text-gray-600 leading-relaxed text-base whitespace-pre-wrap font-medium">
                                        {getSafeVal(cur, ['AB', 'Abstract', 'abstract'], "该文献未提供摘要内容。")}
                                    </p>
                                </div>
                                <div className="flex justify-between">
                                    <button onClick={() => setIdx(i => Math.max(0, i-1))} className="px-10 py-3 bg-white border rounded-2xl font-bold shadow-sm hover:bg-gray-50 transition-all text-sm">上一个</button>
                                    <button onClick={() => setIdx(i => Math.min(list.length-1, i+1))} className="px-10 py-3 bg-white border rounded-2xl font-bold shadow-sm hover:bg-gray-50 transition-all text-sm">下一个</button>
                                </div>
                            </div>

                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-indigo-50/50 p-8 rounded-[2rem] border border-indigo-100 border-dashed space-y-6">
                                    <div>
                                        <span className="text-[10px] font-bold text-indigo-300 uppercase tracking-widest block mb-2">排除概率 (EXCLUDE_PROB)</span>
                                        <span className="text-3xl font-black text-indigo-900">
                                            {getSafeVal(cur, ['exclude_prob', 'prob']) ? (Number(getSafeVal(cur, ['exclude_prob', 'prob'])) * 100).toFixed(1) + '%' : '未知'}
                                        </span>
                                    </div>
                                    <div className="pt-4 border-t border-indigo-100/50">
                                        <span className="text-[10px] font-bold text-indigo-300 uppercase tracking-widest block mb-2">排除原因 (EXCLUDE_REASON)</span>
                                        <p className="text-xl font-bold text-indigo-800 leading-snug">
                                            {getSafeVal(cur, ['exclude_reason', 'reason', 'exclude_reasonb'], "未提供 AI 生成的建议原因。")}
                                        </p>
                                    </div>
                                </div>

                                <div className={`p-8 rounded-[2.5rem] border-4 text-center transition-all ${isExcluded ? 'bg-rose-50 border-rose-100' : 'bg-emerald-50 border-emerald-100'}`}>
                                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">当前决策状态</p>
                                    <span className={`text-4xl font-black ${isExcluded ? 'text-rose-600' : 'text-emerald-600'}`}>
                                        {isExcluded ? '排除' : '保留'}
                                    </span>
                                </div>

                                <div className="bg-white p-6 rounded-[2rem] border shadow-sm flex gap-3">
                                    <button onClick={() => setMarks({...marks, [idx]: '0'})}
                                        className={`flex-1 py-3.5 rounded-xl font-bold text-sm transition-all border-2 ${marks[idx]==='0' ? 'bg-emerald-600 text-white border-emerald-600' : 'text-gray-300 border-gray-100 hover:border-emerald-100'}`}>
                                        设为 保留
                                    </button>
                                    <button onClick={() => setMarks({...marks, [idx]: '1'})}
                                        className={`flex-1 py-3.5 rounded-xl font-bold text-sm transition-all border-2 ${marks[idx]==='1' ? 'bg-rose-600 text-white border-rose-600' : 'text-gray-300 border-gray-100 hover:border-rose-100'}`}>
                                        设为 排除
                                    </button>
                                </div>

                                <div className="bg-white p-6 rounded-[2rem] border shadow-sm">
                                    <div className="flex items-center justify-between mb-4">
                                        <span className="text-[10px] font-bold text-gray-300 uppercase tracking-widest">再核实位置（exclude=0）</span>
                                        <span className="text-[10px] font-bold text-gray-400">{exclude0Indexes.length} 条</span>
                                    </div>

                                    {exclude0Indexes.length ? (
                                        <div className="max-h-52 overflow-auto custom-scroll grid grid-cols-4 gap-2">
                                            {exclude0Indexes.map((i) => {
                                                const t = String(getSafeVal(list[i], ['TI', 'Title', 'title'], '无标题')).trim();
                                                const tip = t.length > 22 ? `${t.slice(0, 22)}...` : t;
                                                return (
                                                    <button
                                                        key={i}
                                                        onClick={() => setIdx(i)}
                                                        title={`第 ${i+1} 条：${tip}`}
                                                        className={`py-2 rounded-xl text-xs font-bold border transition-all ${
                                                            i === idx
                                                                ? 'bg-amber-50 border-amber-300 text-amber-800 ring-2 ring-amber-200'
                                                                : 'bg-gray-50 border-gray-200 text-gray-700 hover:bg-gray-100'
                                                        }`}
                                                    >
                                                        {i+1}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    ) : (
                                        <div className="text-sm text-gray-400">暂无 exclude=0 的条目</div>
                                    )}
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="h-96 flex flex-col items-center justify-center border-4 border-dashed rounded-[3rem] text-gray-300 bg-white/50 border-gray-100">
                            <p className="font-black text-lg">请导入数据开始复核</p>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
